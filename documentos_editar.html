{% extends "base.html" %}
{% block content %}
<h2>Editar Documento</h2>

<section class="panel form-panel">
  <form method="post" class="grid-3">
    <div><label>Nome documento</label><input type="text" name="docnome" maxlength="45" required value="{{ documento.Docnome }}" /></div>
    <div><label>Data vencimento</label><input type="date" name="docdt" value="{{ documento.Docdt or '' }}" /></div>
    <div><label>Avisar com quantos dias</label><input type="number" name="docalertadias" min="0" max="3650" required value="{{ documento.Docalertadias or 30 }}" /></div>
    <div>
      <label>Empresa</label>
      <select name="empresa_empid" required>
        <option value="">Selecione</option>
        {% for e in empresas %}
        <option value="{{ e.Empid }}" {% if e.Empid == documento.Empresa_Empid %}selected{% endif %}>{{ e.Empnome }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="actions-row">
      <button class="btn-inline" type="submit">Salvar</button>
      <a class="btn-link" href="{{ url_for('documentos') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
