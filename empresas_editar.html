{% extends "base.html" %}
{% block content %}
<h2>Editar Empresa</h2>

<section class="panel form-panel">
  <form method="post">
    <label>Nome da empresa</label>
    <input type="text" name="empnome" maxlength="45" required value="{{ empresa.Empnome }}" />
    <div class="actions-row">
      <button class="btn-inline" type="submit">Salvar</button>
      <a class="btn-link" href="{{ url_for('empresas') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
