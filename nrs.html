{% extends "base.html" %}
{% block content %}
<h2>NRS</h2>

<section class="panel form-panel">
  <form method="post" class="grid-3">
    <div><label>Numero NR</label><input type="text" name="nrsnumero" maxlength="45" required /></div>
    <div><label>Data (vencimento)</label><input type="date" name="nrsdata" /></div>
    <div><label>Avisar com quantos dias</label><input type="number" name="nrsalertadias" min="0" max="3650" value="30" required /></div>
    <div>
      <label>Colaborador</label>
      <select name="colaborador_colid" required>
        <option value="">Selecione</option>
        {% for c in colaboradores %}
        <option value="{{ c.Colid }}">{{ c.Colnome }}</option>
        {% endfor %}
      </select>
    </div>
    <div><button type="submit">Cadastrar</button></div>
  </form>
</section>

<section class="panel">
  <table>
    <thead>
      <tr><th>ID</th><th>Numero</th><th>Data</th><th>Aviso</th><th>Colaborador</th><th>Acoes</th></tr>
    </thead>
    <tbody>
      {% for n in nrs %}
      <tr>
        <td>{{ n.Nrsid }}</td>
        <td>{{ n.Nrsnumero }}</td>
        <td>{{ n.Nrsdata }}</td>
        <td>{{ n.Nrsalertadias }} dias antes</td>
        <td>{{ n.Colnome }}</td>
        <td class="actions">
          <a class="btn-link" href="{{ url_for('nrs_editar', nrsid=n.Nrsid) }}">Editar</a>
          <form method="post" action="{{ url_for('nrs_excluir', nrsid=n.Nrsid) }}" onsubmit="return confirm('Excluir NR?');">
            <button class="btn-danger btn-inline" type="submit">Excluir</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="6">Nenhuma NR cadastrada.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
